name: Publish snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  compile-all:
    runs-on: ubuntu-latest

    env:
      JAVA_OPTS: "-Xss32m -Xmx4g"

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Set version
        run: sed -i "s/publishVersion = \"\(.*\)\"/publishVersion = \"\1-SNAPSHOT\"/g" build.mill
      - name: Publish
        shell: bash
        env:
          MILL_SONATYPE_USERNAME: ${{ secrets.OSS_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.OSS_PASSWORD }}
          MILL_PGP_PASSPHRASE: ${{ secrets.MILL_PGP_PASSPHRASE }}
          MILL_PGP_SECRET_BASE64: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
        run: |
          ./mill mill.javalib.SonatypeCentralPublishModule/ --publishArtifacts __.publishArtifacts
