name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  compile-all:
    runs-on: ubuntu-latest

    env:
      JAVA_OPTS: "-Xss32m -Xmx4g"

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - name: Check code format
        uses: jrouly/scalafmt-native-action@v4
        with:
          arguments: "-c .scalafmt.conf --test core pekko examples"
      - name: Compile
        run: ./mill __.compile
      - name: Test
        run: ./mill __.test
